<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" width="320" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e55a2b"/>
    </linearGradient>
    <linearGradient id="halo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background cel -->
  <rect width="320" height="400" rx="24" fill="url(#bg)"/>

  <!-- halo -->
  <ellipse cx="160" cy="82" rx="110" ry="22" fill="none" stroke="url(#halo)" stroke-width="4" filter="url(#glow)"/>

  <!-- hair back -->
  <path d="M70 140 Q50 200 55 260 L75 250 Q70 200 90 150 Z" fill="url(#hair)"/>
  <path d="M250 140 Q270 200 265 260 L245 250 Q250 200 230 150 Z" fill="url(#hair)"/>

  <!-- body -->
  <path d="M110 400 L120 280 Q160 270 200 280 L210 400 Z" fill="#2c2c3e"/>
  <path d="M130 400 L135 290 Q160 285 185 290 L190 400 Z" fill="#1e1b4b"/>

  <!-- neck -->
  <rect x="145" y="210" width="30" height="40" rx="8" fill="#f5d0c5"/>

  <!-- face -->
  <path d="M95 150 Q95 235 160 250 Q225 235 225 150 Q225 85 160 85 Q95 85 95 150 Z" fill="#f5d0c5"/>

  <!-- blush -->
  <ellipse cx="120" cy="175" rx="12" ry="7" fill="#ff9999" opacity="0.4"/>
  <ellipse cx="200" cy="175" rx="12" ry="7" fill="#ff9999" opacity="0.4"/>

  <!-- eyes -->
  <ellipse cx="125" cy="155" rx="14" ry="18" fill="#3a2e2a"/>
  <ellipse cx="195" cy="155" rx="14" ry="18" fill="#3a2e2a"/>
  <circle cx="130" cy="150" r="5" fill="#fff"/>
  <circle cx="200" cy="150" r="5" fill="#fff"/>

  <!-- mouth -->
  <path d="M148 195 Q160 203 172 195" fill="none" stroke="#a65e5e" stroke-width="3" stroke-linecap="round"/>

  <!-- hair front -->
  <path d="M90 120 Q120 60 160 60 Q200 60 230 120 Q240 160 225 180 Q210 120 160 110 Q110 120 95 180 Q80 160 90 120 Z" fill="url(#hair)"/>
  <path d="M150 65 L160 110 L170 65 Z" fill="#ff8c5a"/>

  <!-- wings -->
  <path d="M60 240 Q20 200 30 160 Q50 190 70 210 Z" fill="#e5e7ff" opacity="0.9" stroke="#a5b4fc" stroke-width="2"/>
  <path d="M260 240 Q300 200 290 160 Q270 190 250 210 Z" fill="#e5e7ff" opacity="0.9" stroke="#a5b4fc" stroke-width="2"/>

  <!-- label -->
  <rect x="90" y="340" width="140" height="34" rx="17" fill="#020205" stroke="#ff6b35" stroke-width="2" opacity="0.9"/>
  <text x="160" y="362" text-anchor="middle" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#f0f0f5" font-weight="600">能天使 · 占位</text>
</svg>
