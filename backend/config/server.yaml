server:
  host: "0.0.0.0"
  port: 8765
  ws_path: "/ws"
  static_dir: "../frontend/dist"
  log_level: "info"

sessions:
  max_concurrent: 5
  history_limit: 50
  storage_backend: "sqlite"
  storage_path: "./data/sessions.db"
  ttl_seconds: 86400

agent_adapter:
  default: "kimi_cli"
  adapters:
    kimi_cli:
      type: "kimi_code_cli"
      strategy: "kimi"
      command: "kimi"
      # Kimi Code CLI prompt mode with stream-json output.
      # The adapter builds args per message: [-S, <session_id>, -p, <text>, --output-format, stream-json]
      output_format: "stream-json"
      working_dir: "../workspace"
      restart_on_crash: true
      max_restart_attempts: 3
      request_timeout_seconds: 120
    claude_cli:
      type: "claude_code_cli"
      strategy: "claude"
      command: "claude"
      model: ""
      output_format: "stream-json"
      working_dir: "../workspace"
      restart_on_crash: true
      max_restart_attempts: 3
      request_timeout_seconds: 600
      enabled: true
    codex_cli:
      type: "codex_cli"
      strategy: "codex"
      command: "codex"
      model: ""
      working_dir: "../workspace"
      restart_on_crash: true
      max_restart_attempts: 3
      request_timeout_seconds: 600
      enabled: true
    opencode_cli:
      type: "opencode_cli"
      strategy: "opencode"
      command: "opencode"
      model: ""
      output_format: "json"
      working_dir: "../workspace"
      restart_on_crash: true
      max_restart_attempts: 3
      request_timeout_seconds: 600
      enabled: true
    codebuddy_cli:
      type: "codebuddy_cli"
      strategy: "codebuddy"
      command: "codebuddy"
      model: ""
      output_format: "stream-json"
      working_dir: "../workspace"
      restart_on_crash: true
      max_restart_attempts: 3
      request_timeout_seconds: 600
      enabled: true

emotion:
  method: "keyword"
  llm_model: "moonshot-v1-8k"
  embedding_model: "text-embedding-3-small"
  cache_ttl: 60
  confidence_threshold: 0.6
  cooldown_seconds: 5

tts:
  enabled: false
  engine: "edge_tts"
  voice: "zh-CN-XiaoxiaoNeural"
  speed: 1.0
  auto_play: true

live2d:
  sdk_version: "4.2"
  models_dir: "./assets/live2d"
  default_model: "exusiai"
  enable_lip_sync: true
  idle_motion_interval: 10

# Connection / remote access (reserved for future Electron / relay / intranet-penetration)
# connection:
#   public_endpoint: ""
#   relay:
#     enabled: false
#     endpoint: ""
#     public_key: ""

security:
  allowed_hosts:
    - "localhost"
    - "127.0.0.1"
    - "192.168.*.*"
  max_upload_size_mb: 10
  enable_ast_audit: true
  enable_sensitive_filter: true

